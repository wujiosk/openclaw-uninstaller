<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenClaw 卸载器</title>
    <link rel="stylesheet" href="./openclaw-uninstaller.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="hero-tag">Windows · 扫描 · 备份 · 卸载 · 校验</p>
        <h1>OpenClaw 卸载器</h1>
        <p class="hero-copy">
          扫描本机 OpenClaw 安装痕迹，执行备份和卸载，并在结束后生成校验结果与导出报告。
        </p>
      </header>

      <section class="panel control-panel">
        <div class="button-row">
          <button id="scanBtn" class="btn btn-primary">重新扫描</button>
          <button id="verifyBtn" class="btn">校验残留</button>
          <button id="exportBtn" class="btn">导出报告</button>
          <button id="uninstallBtn" class="btn btn-danger">开始卸载</button>
        </div>

        <label class="checkbox-row">
          <input id="backupEnabled" type="checkbox" checked />
          <span>卸载前先备份到当前项目的 `dist/openclaw-backups`</span>
        </label>

        <div id="summary" class="summary-banner">等待首次扫描</div>
      </section>

      <section class="dashboard">
        <article class="panel">
          <div class="panel-head">
            <h2>扫描结果</h2>
            <span id="itemsCount" class="pill">0 项</span>
          </div>
          <div id="items" class="item-list"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>运行状态</h2>
            <span class="pill">实时信号</span>
          </div>
          <div id="runtime" class="runtime-grid"></div>
        </article>

        <article class="panel panel-wide">
          <div class="panel-head">
            <h2>执行日志</h2>
            <span class="pill">输出</span>
          </div>
          <pre id="logs" class="log-output">等待操作</pre>
        </article>
      </section>
    </main>

    <dialog id="confirmDialog" class="confirm-dialog">
      <form method="dialog" class="confirm-card">
        <h3>确认执行卸载</h3>
        <p>
          该操作会删除 OpenClaw 相关目录、缓存、快捷方式和全局命令入口。建议保留“先备份再卸载”。
        </p>
        <menu class="confirm-actions">
          <button value="cancel" class="btn">取消</button>
          <button value="confirm" class="btn btn-danger">确认卸载</button>
        </menu>
      </form>
    </dialog>

    <script src="./openclaw-uninstaller.js"></script>
  </body>
</html>
