<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NullClaw Web UI</title>
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">LOCAL WEB UI</p>
        <h1>NullClaw 网页聊天界面</h1>
        <p class="subtitle">比终端顺眼一些，仍然直接调用你本机已经配置好的 NullClaw。</p>
      </section>

      <section class="chat-shell">
        <header class="chat-topbar">
          <div>
            <strong>当前模式</strong>
            <span id="statusText">准备就绪</span>
          </div>
          <button id="newSessionBtn" class="ghost-btn" type="button">新会话</button>
        </header>

        <div id="messages" class="messages"></div>

        <form id="chatForm" class="composer">
          <label class="sr-only" for="messageInput">输入消息</label>
          <textarea id="messageInput" rows="3" placeholder="输入你的问题，例如：帮我总结今天的工作计划"></textarea>
          <div class="composer-bar">
            <span class="hint">Shift+Enter 换行，Enter 发送</span>
            <button id="sendBtn" class="send-btn" type="submit">发送</button>
          </div>
        </form>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
  </html>
