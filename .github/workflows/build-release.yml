name: build-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build exe
        run: npm run build:exe

      - name: Create release package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist/openclaw-uninstaller.exe, dist/webui `
            -DestinationPath dist/openclaw-uninstaller-win-x64.zip `
            -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-uninstaller-win-x64
          path: |
            dist/openclaw-uninstaller.exe
            dist/openclaw-uninstaller-win-x64.zip
            dist/webui/**

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/openclaw-uninstaller.exe
            dist/openclaw-uninstaller-win-x64.zip
